name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python package
        run: uv pip install -e . --system

      - name: Check Python imports
        run: python -c "from frida_mcp import server; print('Python OK')"

      - name: Lint with ruff
        run: |
          uv pip install ruff --system
          ruff check src/

      # Agent build skipped - requires patched frida-java-bridge for ESM support
      # Build locally with: cd agent && npm install && npm run build
